# docker-compose.yml
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APPLICATION_NAME=CodeBuddy
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8000
      - APPLICATION_AUTO_RELOAD=False
      - APPLICATION_UVICORN_WORKERS_COUNT=4
      - APPLICATION_CORS_ALLOW_ORIGINS=["*"]
      - APPLICATION_CORS_ALLOW_METHODS=["*"]
      - APPLICATION_CORS_ALLOW_HEADERS=["*"]
      - APPLICATION_REDIS_URL=redis://redis:6379/0
      - APPLICATION_MONGO_URI=mongodb://mongo:27017/
      - APPLICATION_MONGO_DB=CodeBuddy
      - APPLICATION_MONGO_COLLECTION=codebuddy
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
