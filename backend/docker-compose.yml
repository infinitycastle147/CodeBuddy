# Development Docker Compose for CodeBuddy
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APPLICATION_REDIS_URL=${APPLICATION_REDIS_URL}
      - APPLICATION_MONGO_URI=${APPLICATION_MONGO_URI}
      - APPLICATION_MONGO_DB=${APPLICATION_MONGO_DB}
      - APPLICATION_ENCRYPTION_KEY=${APPLICATION_ENCRYPTION_KEY}
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
      - dev_clones:/app/clones
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - codebuddy-dev

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APPLICATION_REDIS_URL=${APPLICATION_REDIS_URL}
      - APPLICATION_MONGO_URI=${APPLICATION_MONGO_URI}
      - APPLICATION_MONGO_DB=${APPLICATION_MONGO_DB}
      - APPLICATION_ENCRYPTION_KEY=${APPLICATION_ENCRYPTION_KEY}
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
      - dev_clones:/app/clones
    depends_on:
      - redis
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_config.worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_config.worker.celery_app inspect ping -d celery@$${HOSTNAME} || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - codebuddy-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - codebuddy-dev

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - dev_mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${APPLICATION_MONGO_DB}
    restart: unless-stopped
    networks:
      - codebuddy-dev

volumes:
  dev_redis_data:
  dev_mongo_data:
  dev_clones:

networks:
  codebuddy-dev:
    driver: bridge
