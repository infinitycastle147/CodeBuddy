# Development Docker Compose for CodeBuddy
# Optimized for local development with hot reload and debugging
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    environment:
      - APPLICATION_NAME=CodeBuddy-Dev
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8000
      - APPLICATION_ENVIRONMENT=development
      - APPLICATION_AUTO_RELOAD=true
      - APPLICATION_UVICORN_WORKERS_COUNT=1
      - APPLICATION_CORS_ALLOW_ORIGINS=*
      - APPLICATION_CORS_ALLOW_METHODS=*
      - APPLICATION_CORS_ALLOW_HEADERS=*
      - APPLICATION_REDIS_URL=redis://redis:6379/0
      - APPLICATION_MONGO_URI=mongodb://mongo:27017/
      - APPLICATION_MONGO_DB=CodeBuddy_Dev
      - APPLICATION_MONGO_COLLECTION=codebuddy_dev
      - APPLICATION_ENCRYPTION_KEY=dev-key-32-bytes-base64-encoded-here
      - LANGFUSE_ENABLED=false
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/__pycache__  # Exclude pycache
      - dev_logs:/app/logs
      - dev_clones:/app/clones
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - codebuddy-dev

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - APPLICATION_NAME=CodeBuddy-Worker-Dev
      - APPLICATION_REDIS_URL=redis://redis:6379/0
      - APPLICATION_MONGO_URI=mongodb://mongo:27017/
      - APPLICATION_MONGO_DB=CodeBuddy_Dev
      - APPLICATION_MONGO_COLLECTION=codebuddy_dev
      - APPLICATION_ENCRYPTION_KEY=dev-key-32-bytes-base64-encoded-here
      - LANGFUSE_ENABLED=false
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
      - dev_logs:/app/logs
      - dev_clones:/app/clones
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.worker.celery_app", "worker", "--loglevel=debug", "--concurrency=1"]
    networks:
      - codebuddy-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - codebuddy-dev

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - dev_mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=CodeBuddy_Dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - codebuddy-dev

  # Optional: MongoDB GUI for development
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=dev123
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - codebuddy-dev

  # Optional: Redis GUI for development
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - codebuddy-dev

  # Optional: Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - codebuddy-dev

volumes:
  dev_redis_data:
    driver: local
  dev_mongo_data:
    driver: local
  dev_logs:
    driver: local
  dev_clones:
    driver: local

networks:
  codebuddy-dev:
    driver: bridge