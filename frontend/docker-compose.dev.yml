# Development Docker Compose for CodeBuddy Frontend
# Optimized for local development with hot reload

version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://app:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-nextauth-secret-key-here
      - MONGODB_URI=mongodb://mongo:27017/CodeBuddy_Dev
    volumes:
      # Mount source code for hot reload
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    restart: unless-stopped
    external_links:
      - backend-app-1:app
    networks:
      - codebuddy-dev

networks:
  codebuddy-dev:
    external: true
    name: backend_codebuddy-dev

volumes:
  frontend_node_modules:
    driver: local
  frontend_next_cache:
    driver: local