# Production-ready Docker Compose for CodeBuddy
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - APPLICATION_NAME=CodeBuddy
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8000
      - APPLICATION_ENVIRONMENT=production
      - APPLICATION_AUTO_RELOAD=false
      - APPLICATION_UVICORN_WORKERS_COUNT=4
      - APPLICATION_UVICORN_TIMEOUT=120
      - APPLICATION_UVICORN_GRACEFUL_TIMEOUT=30
      - APPLICATION_UVICORN_KEEP_ALIVE=2
      - APPLICATION_CORS_ALLOW_ORIGINS=*
      - APPLICATION_CORS_ALLOW_METHODS=*
      - APPLICATION_CORS_ALLOW_HEADERS=*
      - APPLICATION_REDIS_URL=redis://redis:6379/0
      - APPLICATION_MONGO_URI=mongodb://mongo:27017/
      - APPLICATION_MONGO_DB=CodeBuddy
      - APPLICATION_MONGO_COLLECTION=codebuddy
      - APPLICATION_ENCRYPTION_KEY=${APPLICATION_ENCRYPTION_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-true}
    volumes:
      - app_logs:/app/logs
      - app_clones:/app/clones
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    networks:
      - codebuddy-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - APPLICATION_NAME=CodeBuddy-Worker
      - APPLICATION_REDIS_URL=redis://redis:6379/0
      - APPLICATION_MONGO_URI=mongodb://mongo:27017/
      - APPLICATION_MONGO_DB=CodeBuddy
      - APPLICATION_MONGO_COLLECTION=codebuddy
      - APPLICATION_ENCRYPTION_KEY=${APPLICATION_ENCRYPTION_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-true}
    volumes:
      - app_logs:/app/logs
      - app_clones:/app/clones
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery.worker.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - codebuddy-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
    networks:
      - codebuddy-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-}
      - MONGO_INITDB_DATABASE=CodeBuddy
    command: mongod --auth --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - codebuddy-network

volumes:
  redis_data:
    driver: local
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  app_logs:
    driver: local
  app_clones:
    driver: local

networks:
  codebuddy-network:
    driver: bridge
