# Development Docker Compose for CodeBuddy Frontend
# Optimized for local development with hot reload

version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
    container_name: codebuddy-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/CodeBuddy_Dev}
    volumes:
      # Smart mounting - like organized tool compartments
      - ./src:/app/src:cached
      - ./public:/app/public:cached
      - ./package.json:/app/package.json:ro
      - ./next.config.js:/app/next.config.js:ro
      - ./tailwind.config.js:/app/tailwind.config.js:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - codebuddy-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"

  # Backend service reference (if not external)
  backend:
    image: codebuddy-backend:latest
    container_name: codebuddy-backend-dev
    networks:
      - codebuddy-dev
    # Add backend health check here

networks:
  codebuddy-dev:
    driver: bridge
    name: codebuddy-dev

volumes:
  frontend_node_modules:
    driver: local
  frontend_next_cache:
    driver: local